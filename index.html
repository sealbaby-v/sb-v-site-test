<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personal Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --accent-color: #0078d4;
            --edit-accent: #008cc8;
            --font-main: 'M PLUS 1', sans-serif;
            --transition-speed: 0.3s;
        }

        body, body.light-theme {
            --bg-color: #fdfdfd;
            --text-color: #24292f;
            --sidebar-bg: #f6f8fa;
            --topbar-bg: #ffffff;
            --border-color: #d0d7de;
            --btn-bg: #ffffff;
            --btn-hover: #f3f4f6;
            --code-bg: #f6f8fa;
            --quote-bg: #f3f4f6;
            --quote-border: #9ca3af;
            --toc-bg: #ffffff;
        }

        body.dark-theme {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --sidebar-bg: #161b22;
            --topbar-bg: #161b22;
            --border-color: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --code-bg: #161b22;
            --quote-bg: #0d1117;
            --quote-border: #8b949e;
            --toc-bg: #161b22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; height: 100dvh; overflow: hidden;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-size: clamp(16px, 1vw + 12px, 18px);
        }

        /* 印刷・保存時の最適化 */
        @media print {
            #sidebar, #topbar, .toast, #sidebar-overlay { display: none !important; }
            body, #main-container, #content-wrapper { display: block; height: auto; overflow: visible; background: white; }
            #content-wrapper { padding: 0; }
            #view-area { max-width: 100%; }
            .page-break { page-break-after: always; }
        }

        body.is-editing #main-container { box-shadow: inset 0 0 0 4px var(--edit-accent); }
        
        #sidebar {
            width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; transition: transform var(--transition-speed);
            flex-shrink: 0; z-index: 10; height: 100%;
        }
        #sidebar.collapsed { width: 0; transform: translateX(-280px); }
        
        #main-container { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
        #workspace-title-input { background: transparent; border: 1px solid transparent; color: inherit; font-weight: 600; font-size: 1.1em; width: 100%; padding: 4px; border-radius: 4px; }
        #workspace-title-input:focus { background: var(--btn-bg); border-color: var(--accent-color); outline: none; }

        .page-list { flex-grow: 1; overflow-y: auto; list-style: none; }
        .page-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .page-item:hover { background-color: var(--btn-hover); }
        .page-item.active { border-left: 4px solid var(--accent-color); background-color: var(--btn-hover); font-weight: 600; }
        .page-title-text { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.95em; }
        .share-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }

        #topbar { height: 64px; background-color: var(--topbar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
        .icon-btn { background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; font-size: 0.85em; font-weight: 600; }
        .icon-btn.primary { background-color: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        #content-wrapper { flex-grow: 1; padding: 40px 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #view-area { line-height: 1.8; max-width: 800px; margin: 0 auto; word-break: break-word; }
        #view-area h1 { font-size: 2em; border-bottom: 2px solid var(--border-color); padding-bottom: 0.2em; margin: 1.5em 0 0.8em; }
        #view-area h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); margin: 1.2em 0 0.5em; }
        
        .toc-container { background: var(--toc-bg); border: 1px solid var(--border-color); padding: 15px; margin: 20px 0; border-radius: 8px; display: inline-block; min-width: 250px; }
        #edit-area { display: none; width: 100%; height: 100%; background: transparent; color: inherit; border: none; outline: none; font-family: monospace; font-size: 1em; resize: none; max-width: 800px; margin: 0 auto; }

        .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 30px; background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; z-index: 100; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; }
            #sidebar.collapsed { width: 0; transform: translateX(-280px); }
            #sidebar:not(.collapsed) { width: 280px; transform: translateX(0); box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
            .btn-text { display: none; }
        }
    </style>
</head>
<body class="light-theme">

    <div id="sidebar-overlay" onclick="app.closeSidebar()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:5;"></div>

    <nav id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <input type="text" id="workspace-title-input" value="Workspace" onchange="app.updateWorkspaceTitle(this.value)">
        </div>
        <ul class="page-list" id="page-list"></ul>
        <div class="sidebar-footer" id="sidebar-actions">
            <button class="icon-btn" onclick="app.addPage()">+ 新規ページ</button>
            <button class="icon-btn primary" onclick="app.shareSelectedPages()">🔗 共有リンク</button>
            <button class="icon-btn" onclick="app.exportSelectedHTML()">📄 選択分をHTML保存</button>
        </div>
    </nav>

    <div id="main-container">
        <header id="topbar">
            <button class="icon-btn" onclick="app.openSidebar()">☰</button>
            <input type="text" id="current-page-title" style="flex:1; border:none; background:transparent; font-size:1.1em; font-weight:600;" onchange="app.updateTitle(this.value)">
            <button class="icon-btn" onclick="app.toggleEditMode()" id="edit-btn">✏️ 編集</button>
            <button class="icon-btn" onclick="window.print()">🖨️ PDF</button>
            <button class="icon-btn" onclick="app.exportToPNG()">🖼️ PNG</button>
        </header>
        
        <div id="content-wrapper">
            <div id="view-area"></div>
            <textarea id="edit-area"></textarea>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const app = {
            pages: [],
            workspaceTitle: "Workspace",
            currentPageId: null,
            isEditing: false,

            init() {
                this.loadLocalData();
                this.handleRouting();
                window.addEventListener('hashchange', () => this.handleRouting());
            },

            loadLocalData() {
                const data = localStorage.getItem('personal_workspace_data_v5');
                this.pages = data ? JSON.parse(data) : [];
                this.workspaceTitle = localStorage.getItem('personal_workspace_title') || "Workspace";
                document.getElementById('workspace-title-input').value = this.workspaceTitle;
            },

            saveData() {
                localStorage.setItem('personal_workspace_data_v5', JSON.stringify(this.pages));
                localStorage.setItem('personal_workspace_title', this.workspaceTitle);
            },

            async handleRouting() {
                const hash = window.location.hash;
                if (hash.startsWith('#s=')) {
                    const decoded = await this.decompressData(hash.replace('#s=', ''));
                    if (decoded) {
                        this.pages = decoded.pages;
                        this.workspaceTitle = decoded.wsTitle;
                        document.getElementById('workspace-title-input').value = this.workspaceTitle;
                    }
                }
                if (this.pages.length === 0) this.addPage("Welcome", "# 新規ワークスペース\nここから作成を開始してください。");
                this.renderSidebar();
                this.switchPage(this.pages[0].id);
            },

            renderSidebar() {
                const list = document.getElementById('page-list');
                list.innerHTML = '';
                this.pages.forEach(p => {
                    const li = document.createElement('li');
                    li.className = `page-item ${p.id === this.currentPageId ? 'active' : ''}`;
                    li.innerHTML = `
                        <input type="checkbox" class="share-checkbox" data-id="${p.id}" onclick="event.stopPropagation()">
                        <span class="page-title-text">${p.title || '無題'}</span>
                    `;
                    li.onclick = () => this.switchPage(p.id);
                    list.appendChild(li);
                });
            },

            switchPage(id) {
                const page = this.pages.find(p => p.id === id);
                if (!page) return;
                this.currentPageId = id;
                document.getElementById('current-page-title').value = page.title;
                document.getElementById('edit-area').value = page.content;
                document.getElementById('view-area').innerHTML = this.parseFTML(page.content);
                this.renderSidebar();
            },

            parseFTML(text) {
                if (!text) return '';
                let html = text;
                const escaped = [];
                // @@ エスケープ
                html = html.replace(/@@(.*?)@@/g, (m, p1) => {
                    escaped.push(p1.replace(/</g, "&lt;"));
                    return `__ESC_${escaped.length - 1}__`;
                });
                // 簡易構文
                html = html.replace(/^(\+{1,3})\s+(.*?)$/gm, (m, l, t) => `<h${l.length}>${t}</h${l.length}>`);
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\/\/(.*?)\/\//g, '<em>$1</em>');
                html = html.replace(/^>\s+(.*?)$/gm, '<blockquote>$1</blockquote>');
                html = html.replace(/\n/g, '<br>');
                // エスケープ戻し
                escaped.forEach((v, i) => html = html.replace(`__ESC_${i}__`, v));
                return html;
            },

            // 選択したページを1つのHTMLファイルとして出力
            exportSelectedHTML() {
                const selectedIds = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => cb.dataset.id);
                if (selectedIds.length === 0) return this.showToast("ページを選択してください");

                const selectedPages = this.pages.filter(p => selectedIds.includes(p.id));
                let combinedBody = "";
                selectedPages.forEach(p => {
                    combinedBody += `<section class="page-break"><h1>${p.title}</h1><div>${this.parseFTML(p.content)}</div></section><hr style="margin:40px 0; border:0; border-top:1px solid #eee;">`;
                });

                const finalHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${this.workspaceTitle}</title>
                <style>body{font-family:sans-serif; line-height:1.6; max-width:800px; margin:40px auto; padding:20px; color:#333;} h1{border-bottom:2px solid #eee; padding-bottom:10px;} blockquote{background:#f9f9f9; border-left:4px solid #ccc; padding:10px; margin:10px 0;} @media print{.page-break{page-break-after:always;}}</style>
                </head><body>${combinedBody}</body></html>`;

                const blob = new Blob([finalHTML], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${this.workspaceTitle}_export.html`;
                a.click();
            },

            // PNGとして保存
            async exportToPNG() {
                this.showToast("画像を生成中...");
                const element = document.getElementById('view-area');
                const canvas = await html2canvas(element, {
                    backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-color'),
                    scale: 2
                });
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `${document.getElementById('current-page-title').value || 'page'}.png`;
                a.click();
                this.showToast("PNGを保存しました");
            },

            async compressData(obj) {
                const stream = new Blob([JSON.stringify(obj)]).stream().pipeThrough(new CompressionStream('deflate'));
                const buffer = await new Response(stream).arrayBuffer();
                return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            },

            async decompressData(b64) {
                try {
                    const bin = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
                    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
                    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
                    return JSON.parse(await new Response(stream).text());
                } catch(e) { return null; }
            },

            addPage(title = "新規ページ", content = "") {
                const id = 'p' + Date.now();
                this.pages.push({ id, title, content });
                this.saveData();
                this.switchPage(id);
            },

            updateTitle(v) { 
                const p = this.pages.find(x => x.id === this.currentPageId); 
                if(p) { p.title = v; this.saveData(); this.renderSidebar(); }
            },

            updateWorkspaceTitle(v) { this.workspaceTitle = v; this.saveData(); },

            toggleEditMode() {
                this.isEditing = !this.isEditing;
                const view = document.getElementById('view-area');
                const edit = document.getElementById('edit-area');
                const btn = document.getElementById('edit-btn');
                if (this.isEditing) {
                    view.style.display = 'none';
                    edit.style.display = 'block';
                    btn.textContent = "✅ 完了";
                    edit.focus();
                } else {
                    const p = this.pages.find(x => x.id === this.currentPageId);
                    if(p) p.content = edit.value;
                    this.saveData();
                    this.switchPage(this.currentPageId);
                    view.style.display = 'block';
                    edit.style.display = 'none';
                    btn.textContent = "✏️ 編集";
                }
            },

            async shareSelectedPages() {
                const ids = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => cb.dataset.id);
                if (ids.length === 0) return this.showToast("ページを選択してください");
                const data = { wsTitle: this.workspaceTitle, pages: this.pages.filter(p => ids.includes(p.id)) };
                const s = await this.compressData(data);
                navigator.clipboard.writeText(window.location.origin + window.location.pathname + '#s=' + s);
                this.showToast("共有リンクをコピーしました");
            },

            openSidebar() { document.getElementById('sidebar').classList.remove('collapsed'); document.getElementById('sidebar-overlay').style.display = 'block'; },
            closeSidebar() { document.getElementById('sidebar').classList.add('collapsed'); document.getElementById('sidebar-overlay').style.display = 'none'; },
            showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); }
        };

        app.init();
    </script>
</body>
</html>
