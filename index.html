<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Memo</title>
    <style>
        /* 基本設定 */
        body {
            background-color: #EDEDED;
            color: #000000;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            border-left: 4px solid #008CC8;
            padding-left: 15px;
        }

        /* 入力エリア */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #000000;
            background-color: #FFFFFF;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 2px #008CC8;
        }

        button#add-btn {
            padding: 0 20px;
            background-color: #000000;
            color: #EDEDED;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button#add-btn:hover {
            background-color: #008CC8;
        }

        /* メモ一覧 */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: #FFFFFF;
            border-bottom: 1px solid #000000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .memo-text {
            word-break: break-all;
            line-height: 1.5;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #008CC8;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px;
            margin-left: 10px;
            white-space: nowrap;
        }

        .delete-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MEMO</h1>
    
    <div class="input-group">
        <input type="text" id="memo-input" placeholder="新しいメモを入力..." autocomplete="off">
        <button id="add-btn">追加</button>
    </div>

    <ul id="memo-list"></ul>
</div>

<script>
    const memoInput = document.getElementById('memo-input');
    const addBtn = document.getElementById('add-btn');
    const memoList = document.getElementById('memo-list');

    // 初期読み込み
    window.onload = () => {
        const savedMemos = JSON.parse(localStorage.getItem('my_memos')) || [];
        savedMemos.forEach(text => createMemoElement(text));
    };

    // メモ追加関数
    function addMemo() {
        const text = memoInput.value.trim();
        if (text) {
            createMemoElement(text);
            saveMemos();
            memoInput.value = '';
        }
    }

    // 要素作成
    function createMemoElement(text) {
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="memo-text">${escapeHtml(text)}</span>
            <button class="delete-btn">削除</button>
        `;

        li.querySelector('.delete-btn').addEventListener('click', () => {
            li.remove();
            saveMemos();
        });

        memoList.appendChild(li);
    }

    // 保存
    function saveMemos() {
        const texts = Array.from(document.querySelectorAll('.memo-text')).map(span => span.innerText);
        localStorage.setItem('my_memos', JSON.stringify(texts));
    }

    // XSS対策用エスケープ
    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
        });
    }

    // イベントリスナー
    addBtn.addEventListener('click', addMemo);
    memoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addMemo();
    });
</script>

</body>
</html>
