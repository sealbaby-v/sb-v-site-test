<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personal Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #0078d4;
            --edit-accent: #107c10;
            --font-main: 'M PLUS 1', sans-serif;
            --transition-speed: 0.3s;
        }

        body, body.light-theme {
            --bg-color: #fdfdfd;
            --text-color: #24292f;
            --sidebar-bg: #f6f8fa;
            --topbar-bg: #ffffff;
            --border-color: #d0d7de;
            --btn-bg: #ffffff;
            --btn-hover: #f3f4f6;
            --code-bg: #f6f8fa;
            --quote-bg: #f3f4f6;
            --quote-border: #9ca3af;
            --toc-bg: #ffffff;
        }

        body.dark-theme {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --sidebar-bg: #161b22;
            --topbar-bg: #161b22;
            --border-color: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --code-bg: #161b22;
            --quote-bg: #0d1117;
            --quote-border: #8b949e;
            --toc-bg: #161b22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; height: 100dvh; overflow: hidden;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-size: clamp(16px, 1vw + 12px, 18px);
        }

        body.is-editing #main-container { box-shadow: inset 0 0 0 4px var(--edit-accent); }
        body.is-editing #topbar { border-bottom: 2px solid var(--edit-accent); }

        #sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 5; opacity: 0; transition: opacity var(--transition-speed);
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        #sidebar {
            width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; transition: transform var(--transition-speed), width var(--transition-speed);
            flex-shrink: 0; z-index: 10; height: 100%;
        }
        #sidebar.collapsed { width: 0; transform: translateX(-280px); border-right: none; }
        
        #main-container { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        .sidebar-header { 
            padding: 15px 20px; border-bottom: 1px solid var(--border-color); 
            display: flex; flex-direction: column; gap: 8px;
        }
        #workspace-title-input {
            background: transparent; border: 1px solid transparent; color: inherit;
            font-weight: 600; font-size: 1.1em; width: 100%; padding: 4px; border-radius: 4px;
            transition: border-color 0.2s;
        }
        #workspace-title-input:hover:not([readonly]) { border-color: var(--border-color); }
        #workspace-title-input:focus { background: var(--btn-bg); border-color: var(--accent-color); outline: none; }

        .page-list { flex-grow: 1; overflow-y: auto; list-style: none; }
        .page-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .page-item:hover { background-color: var(--btn-hover); }
        .page-item.active { border-left: 4px solid var(--accent-color); background-color: var(--btn-hover); font-weight: 600; }
        .page-title-text { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.95em; }
        .share-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }

        #topbar { height: 64px; background-color: var(--topbar-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
        
        .icon-btn { background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; font-size: 0.9em; font-weight: 600; }
        .icon-btn.primary { background-color: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .icon-btn.edit-active { background-color: var(--edit-accent); color: #fff; border-color: var(--edit-accent); }
        
        #current-page-title { flex-grow: 1; font-size: 1.2em; font-weight: 600; border: none; background: transparent; color: inherit; outline: none; min-width: 0; padding: 5px; }

        #content-wrapper { flex-grow: 1; padding: 40px 30px calc(60px + env(safe-area-inset-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        #view-area { line-height: 1.8; max-width: 800px; margin: 0 auto; word-break: break-word; }
        
        #view-area h1 { font-size: 2em; border-bottom: 2px solid var(--border-color); padding-bottom: 0.2em; margin: 1.5em 0 0.8em; }
        #view-area h2 { font-size: 1.5em; margin: 1.2em 0 0.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.2em; }
        #view-area h3 { font-size: 1.25em; margin: 1em 0 0.5em; }

        .toc-container { background: var(--toc-bg); border: 1px solid var(--border-color); padding: 20px; margin: 20px 0; border-radius: 8px; display: inline-block; min-width: 250px; max-width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .toc-title { font-weight: 600; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .toc-list { list-style: none; font-size: 0.9em; }
        .toc-item { margin: 8px 0; }
        .toc-link { color: var(--accent-color); text-decoration: underline; cursor: pointer; transition: opacity 0.2s; }
        .toc-link:hover { opacity: 0.7; }

        #view-area blockquote { border-left: 4px solid var(--quote-border); padding-left: 15px; margin: 1em 0; color: #666; background: var(--quote-bg); padding: 10px 15px; border-radius: 0 6px 6px 0; }
        .wiki-collapsible { margin: 1em 0; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; background: var(--code-bg); }
        .wiki-collapsible summary { cursor: pointer; font-weight: 600; color: var(--accent-color); outline: none; user-select: none; }
        .collapsible-content { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-color); }

        #edit-area { display: none; width: 100%; height: 100%; min-height: 70vh; background: transparent; color: inherit; border: none; outline: none; font-family: monospace; font-size: 1em; resize: none; max-width: 800px; margin: 0 auto; line-height: 1.6; }
        .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(30px + env(safe-area-inset-bottom)); background: var(--text-color); color: var(--bg-color); padding: 12px 24px; border-radius: 30px; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; }
            #sidebar:not(.collapsed) { width: 280px; transform: translateX(0); box-shadow: 4px 0 16px rgba(0,0,0,0.1); }
            .btn-text { display: none; }
            #content-wrapper { padding: 20px 15px calc(40px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body class="light-theme">

    <div id="sidebar-overlay" onclick="app.closeSidebar()"></div>

    <nav id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <span style="font-size: 0.75em; color: #666;">WORKSPACE TITLE</span>
                <button class="icon-btn" onclick="app.closeSidebar()" style="padding: 4px 8px; border: none; background: transparent;">✕</button>
            </div>
            <input type="text" id="workspace-title-input" value="Workspace" onchange="app.updateWorkspaceTitle(this.value)">
        </div>
        <ul class="page-list" id="page-list"></ul>
        <div class="sidebar-footer" id="sidebar-actions">
            <button class="icon-btn" onclick="app.addPage()" style="justify-content: center;">+ 新規ページ</button>
            <button class="icon-btn primary" onclick="app.shareSelectedPages()" style="justify-content: center;">🔗 選択項目を共有</button>
        </div>
    </nav>

    <div id="main-container">
        <header id="topbar">
            <button class="icon-btn" onclick="app.openSidebar()">☰</button>
            <input type="text" id="current-page-title" placeholder="無題" onchange="app.updateTitle(this.value)">
            <button class="icon-btn" onclick="app.toggleTheme()">🌓</button>
            <button class="icon-btn" id="edit-toggle-btn" onclick="app.toggleEditMode()">
                ✏️<span class="btn-text"> 編集</span>
            </button>
        </header>
        
        <div id="content-wrapper">
            <div id="view-area"></div>
            <textarea id="edit-area"></textarea>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const app = {
            pages: [],
            workspaceTitle: "Workspace",
            currentPageId: null,
            isEditing: false,
            isSharedMode: false,
            sharedRawData: null,

            init() {
                this.cacheDOM();
                this.initTheme();
                this.handleRouting(true);
                window.addEventListener('hashchange', () => this.handleRouting(false));
            },

            cacheDOM() {
                this.dom = {
                    body: document.body,
                    sidebar: document.getElementById('sidebar'),
                    overlay: document.getElementById('sidebar-overlay'),
                    pageList: document.getElementById('page-list'),
                    titleInput: document.getElementById('current-page-title'),
                    wsTitleInput: document.getElementById('workspace-title-input'),
                    viewArea: document.getElementById('view-area'),
                    editArea: document.getElementById('edit-area'),
                    editBtn: document.getElementById('edit-toggle-btn'),
                    toast: document.getElementById('toast'),
                    sidebarActions: document.getElementById('sidebar-actions')
                };
            },

            initTheme() {
                const saved = localStorage.getItem('personal_workspace_theme');
                if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.dom.body.classList.replace('light-theme', 'dark-theme');
                }
            },

            toggleTheme() {
                const isDark = this.dom.body.classList.toggle('dark-theme');
                this.dom.body.classList.toggle('light-theme', !isDark);
                localStorage.setItem('personal_workspace_theme', isDark ? 'dark' : 'light');
            },

            handleRouting(isInitial) {
                const hash = window.location.hash;

                if (hash.startsWith('#share=')) {
                    this.isSharedMode = true;
                    const raw = hash.replace('#share=', '');
                    if (this.sharedRawData !== raw) {
                        this.sharedRawData = raw;
                        this.loadSharedData(raw);
                    }
                    return;
                }

                if (this.isSharedMode && hash.startsWith('#page=')) {
                    this.switchPage(hash.replace('#page=', ''), false);
                    return;
                }

                this.isSharedMode = false;
                this.dom.sidebarActions.style.display = 'flex';
                this.dom.editBtn.style.display = 'flex';
                this.dom.titleInput.readOnly = false;
                this.dom.wsTitleInput.readOnly = false;
                
                this.loadLocalData();

                if (this.pages.length === 0) {
                    this.createDefaultResourcePage();
                } else if (hash.startsWith('#page=')) {
                    this.switchPage(hash.replace('#page=', ''), false);
                } else if (isInitial || !this.currentPageId) {
                    this.switchPage(this.pages[0].id, true);
                }
            },

            createDefaultResourcePage() {
                const content = `[[toc]]

+ 1. 特殊構文: エスケープ
\`@@\` で囲むと、中の文字は構文として処理されずそのまま表示されます。
例: @@**この太字構文は無効化されます**@@

+ 2. テキスト装飾
**太字 (Bold)** : \`**text**\`
//斜体 (Italic)// : \`//text//\`
__下線 (Underline)__ : \`__text__\`
--取り消し線 (Strike)-- : \`--text--\`

+ 3. 見出し
行頭に \`+\` を追加します。数はレベルに対応します。
\`+ 見出し1\`
\`++ 見出し2\`
\`+++ 見出し3\`

+ 4. Wikidot風ブロック
++ 折りたたみ (Collapsible)
[[collapsible show="+ 詳細を表示" hide="- 閉じる"]]
折りたたまれる内容です。
[[/collapsible]]

++ カスタムDivブロック
[[div style="background: #eef; padding: 10px; border-radius: 5px; color: #333;"]]
スタイルを指定したブロックを作成できます。
[[/div]]

+ 5. 引用
> 行頭に \`>\` を置きます。

+ 6. 目次
\`[[toc]]\` と書くと、ページ内の見出しから自動生成されます。`;

                this.addPage("スタイルリソース", content);
            },

            loadSharedData(encoded) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(encoded))));
                    this.pages = decoded.pages || (Array.isArray(decoded) ? decoded : [decoded]);
                    this.workspaceTitle = decoded.wsTitle || "Shared Workspace";
                    
                    this.dom.wsTitleInput.value = this.workspaceTitle;
                    this.dom.wsTitleInput.readOnly = true;
                    this.dom.sidebarActions.style.display = 'none';
                    this.dom.editBtn.style.display = 'none';
                    this.dom.titleInput.readOnly = true;

                    this.renderSidebar();
                    this.switchPage(this.pages[0].id, false);
                    this.showToast("共有ビューを表示中");
                } catch(e) {
                    this.showToast("データの読み込みに失敗");
                    window.location.hash = '';
                }
            },

            loadLocalData() {
                const data = localStorage.getItem('personal_workspace_data_v5');
                const title = localStorage.getItem('personal_workspace_title');
                this.pages = data ? JSON.parse(data) : [];
                this.workspaceTitle = title || "Workspace";
                this.dom.wsTitleInput.value = this.workspaceTitle;
                this.renderSidebar();
            },

            renderSidebar() {
                this.dom.pageList.innerHTML = '';
                this.pages.forEach(page => {
                    const li = document.createElement('li');
                    li.className = `page-item ${page.id === this.currentPageId ? 'active' : ''}`;
                    if (!this.isSharedMode) {
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.className = 'share-checkbox';
                        cb.dataset.id = page.id;
                        cb.onclick = e => e.stopPropagation();
                        li.appendChild(cb);
                    }
                    const span = document.createElement('span');
                    span.className = 'page-title-text';
                    span.textContent = page.title || "無題";
                    li.onclick = () => {
                        this.switchPage(page.id, true);
                        if(window.innerWidth <= 768) this.closeSidebar();
                    };
                    li.appendChild(span);
                    this.dom.pageList.appendChild(li);
                });
            },

            switchPage(id, updateHash) {
                const page = this.pages.find(p => p.id === id);
                if (!page) return;
                if (this.isEditing) this.toggleEditMode();
                this.currentPageId = id;
                this.dom.titleInput.value = page.title;
                this.dom.editArea.value = page.content;
                this.dom.viewArea.innerHTML = this.parseFTML(page.content);
                this.renderSidebar();
                if (updateHash && !this.isSharedMode) window.location.hash = '#page=' + id;
            },

            parseFTML(text) {
                if (!text) return '';
                let html = text;
                const headings = [];

                // 1. エスケープ構文 @@...@@ を一時退避
                const escapedContent = [];
                html = html.replace(/@@(.*?)@@/g, (m, p1) => {
                    const placeholder = `__ESCAPED_${escapedContent.length}__`;
                    escapedContent.push(p1.replace(/</g, "&lt;").replace(/>/g, "&gt;"));
                    return placeholder;
                });

                // 2. Wikidot構文パース
                html = html.replace(/\[\[div(.*?)\]\]/gi, '<div$1>');
                html = html.replace(/\[\[\/div\]\]/gi, '</div>');
                html = html.replace(/\[\[collapsible(?:\s+show="([^"]+)")?(?:\s+hide="([^"]+)")?\]\]/gi, (m, s, h) => 
                    `<details class="wiki-collapsible"><summary>${s || '+ 開く'}</summary><div class="collapsible-content">`);
                html = html.replace(/\[\[\/collapsible\]\]/gi, '</div></details>');

                html = html.replace(/^(\+{1,6})\s+(.*?)$/gm, (m, l, t) => {
                    const level = l.length;
                    const id = "h-" + Math.random().toString(36).substr(2, 5);
                    headings.push({ level, title: t, id });
                    return `<h${level} id="${id}">${t}</h${level}>`;
                });

                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\/\/(.*?)\/\//g, '<em>$1</em>');
                html = html.replace(/__(.*?)__/g, '<u>$1</u>');
                html = html.replace(/--(.*?)--/g, '<del>$1</del>');
                html = html.replace(/^>\s+(.*?)$/gm, '<blockquote>$1</blockquote>');
                html = html.replace(/(?:\r\n|\r|\n)/g, '<br>');
                html = html.replace(/<br><h/g, '<h');
                html = html.replace(/<\/h(\d)><br>/g, '</h$1>');

                // 3. TOC生成
                if (html.includes('[[toc]]')) {
                    let tocHtml = '<div class="toc-container"><div class="toc-title">目次</div><ul class="toc-list">';
                    headings.forEach(h => {
                        tocHtml += `<li class="toc-item" style="margin-left:${(h.level-1)*16}px"><span class="toc-link" onclick="document.getElementById('${h.id}').scrollIntoView()">${h.title}</span></li>`;
                    });
                    html = html.replace('[[toc]]', tocHtml + '</ul></div>');
                }

                // 4. 退避していたエスケープ内容を戻す
                escapedContent.forEach((content, i) => {
                    html = html.replace(`__ESCAPED_${i}__`, content);
                });

                return html;
            },

            updateWorkspaceTitle(val) {
                this.workspaceTitle = val;
                if(!this.isSharedMode) localStorage.setItem('personal_workspace_title', val);
            },

            addPage(title = "新規ページ", content = "") {
                const newId = 'p_' + Date.now();
                this.pages.push({ id: newId, title, content });
                this.saveData();
                this.switchPage(newId, true);
            },

            updateTitle(val) {
                const page = this.pages.find(p => p.id === this.currentPageId);
                if (page) { page.title = val; this.saveData(); this.renderSidebar(); }
            },

            saveData() {
                if(!this.isSharedMode) localStorage.setItem('personal_workspace_data_v5', JSON.stringify(this.pages));
            },

            toggleEditMode() {
                this.isEditing = !this.isEditing;
                this.dom.body.classList.toggle('is-editing', this.isEditing);
                if (this.isEditing) {
                    this.dom.viewArea.style.display = 'none';
                    this.dom.editArea.style.display = 'block';
                    this.dom.editBtn.classList.add('edit-active');
                    this.dom.editArea.focus();
                } else {
                    const page = this.pages.find(p => p.id === this.currentPageId);
                    if (page) {
                        page.content = this.dom.editArea.value;
                        this.dom.viewArea.innerHTML = this.parseFTML(page.content);
                        this.saveData();
                    }
                    this.dom.viewArea.style.display = 'block';
                    this.dom.editArea.style.display = 'none';
                    this.dom.editBtn.classList.remove('edit-active');
                }
            },

            openSidebar() { this.dom.sidebar.classList.remove('collapsed'); this.dom.overlay.classList.add('active'); },
            closeSidebar() { this.dom.sidebar.classList.add('collapsed'); this.dom.overlay.classList.remove('active'); },
            showToast(m) { this.dom.toast.textContent = m; this.dom.toast.style.opacity = 1; setTimeout(() => this.dom.toast.style.opacity = 0, 2000); },

            shareSelectedPages() {
                const ids = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(c => c.dataset.id);
                if (ids.length === 0) return this.showToast("ページを選択してください");
                const data = {
                    wsTitle: this.workspaceTitle,
                    pages: this.pages.filter(p => ids.includes(p.id))
                };
                const url = window.location.origin + window.location.pathname + '#share=' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                navigator.clipboard.writeText(url).then(() => this.showToast("共有リンクをコピーしました"));
            }
        };

        app.init();
    </script>
</body>
</html>
