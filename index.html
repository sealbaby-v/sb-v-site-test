<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personal Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=M+PLUS+1:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --font-main: 'Inter', 'M PLUS 1', sans-serif;
            --transition-speed: 0.2s;
            --sidebar-width: 280px;
        }

        /* Light Theme */
        body, body.light-theme {
            --bg-color: #ffffff;
            --text-color: #1f2937;
            --sidebar-bg: #f9fafb;
            --topbar-bg: rgba(255, 255, 255, 0.8);
            --border-color: #e5e7eb;
            --btn-bg: #ffffff;
            --btn-hover: #f3f4f6;
            --code-bg: #f3f4f6;
            --quote-bg: #f9fafb;
            --quote-border: #d1d5db;
            --toc-bg: #f9fafb;
        }

        /* Dark Theme */
        body.dark-theme {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --sidebar-bg: #1e293b;
            --topbar-bg: rgba(15, 23, 42, 0.8);
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-hover: #334155;
            --code-bg: #1e293b;
            --quote-bg: #0f172a;
            --quote-border: #475569;
            --toc-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* Sidebar Style */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed), width var(--transition-speed);
            z-index: 20;
        }
        #sidebar.collapsed { width: 0; transform: translateX(-100%); }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        #workspace-title-input { 
            background: transparent; border: none; color: inherit; 
            font-weight: 700; font-size: 1.1em; width: 100%; outline: none;
        }

        .page-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 10px 0; }
        .page-item { 
            padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: background 0.2s; font-size: 0.95em;
        }
        .page-item:hover { background-color: var(--btn-hover); }
        .page-item.active { background-color: var(--btn-hover); border-right: 3px solid var(--accent-color); font-weight: 600; }
        .page-title-text { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { opacity: 0; color: #ef4444; border: none; background: none; cursor: pointer; padding: 4px; }
        .page-item:hover .delete-btn { opacity: 1; }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }

        /* Main Content Style */
        #main-container { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        #topbar { 
            height: 60px; background-color: var(--topbar-bg); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; 
            padding: 0 20px; gap: 12px; sticky; top: 0; z-index: 10;
        }
        
        .icon-btn { 
            background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color); 
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85em; 
            font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--btn-hover); }
        .icon-btn.primary { background-color: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        .icon-btn.primary:hover { background-color: var(--accent-hover); }

        #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 40px 20px; scroll-behavior: smooth; }
        #article-container { max-width: 800px; margin: 0 auto; }

        /* TOC Style */
        .toc-container { 
            background: var(--toc-bg); border: 1px solid var(--border-color); 
            padding: 20px; margin-bottom: 30px; border-radius: 12px;
        }
        .toc-title { font-weight: 700; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; }
        .toc-list { list-style: none; }
        .toc-item { margin: 4px 0; }
        .toc-item a { color: var(--accent-color); text-decoration: none; font-size: 0.95em; }
        .toc-item a:hover { text-decoration: underline; }
        .toc-h1 { margin-left: 0; font-weight: 600; }
        .toc-h2 { margin-left: 15px; }
        .toc-h3 { margin-left: 30px; font-size: 0.9em; }

        /* View Area Typography */
        #view-area h1 { font-size: 2.5em; font-weight: 800; margin: 1em 0 0.5em; line-height: 1.2; }
        #view-area h2 { font-size: 1.8em; margin: 1.5em 0 0.8em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        #view-area h3 { font-size: 1.3em; margin: 1.2em 0 0.6em; }
        #view-area p { margin-bottom: 1.2em; line-height: 1.8; }
        #view-area blockquote { 
            border-left: 4px solid var(--accent-color); background: var(--quote-bg); 
            padding: 15px 20px; margin: 20px 0; border-radius: 0 8px 8px 0; font-style: italic;
        }

        #edit-area { 
            display: none; width: 100%; min-height: 70vh; background: transparent; 
            color: inherit; border: none; outline: none; font-family: 'Courier New', monospace; 
            font-size: 1.1em; resize: none; line-height: 1.6;
        }

        .toast { 
            position: fixed; left: 50%; transform: translateX(-50%); bottom: 30px; 
            background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 12px; 
            opacity: 0; transition: 0.3s; z-index: 100; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; top: 0; left: 0; }
            .btn-text { display: none; }
        }
    </style>
</head>
<body class="light-theme">

    <div id="sidebar-overlay" onclick="app.closeSidebar()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:15; backdrop-filter: blur(2px);"></div>

    <nav id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <input type="text" id="workspace-title-input" value="Workspace" onchange="app.updateWorkspaceTitle(this.value)">
        </div>
        <ul class="page-list" id="page-list"></ul>
        <div class="sidebar-footer">
            <button class="icon-btn" onclick="app.addPage()"><span>+</span> 新規ページ</button>
            <button class="icon-btn" onclick="app.toggleTheme()">🌓 テーマ切り替え</button>
            <button class="icon-btn primary" onclick="app.shareSelectedPages()">🔗 共有リンクを作成</button>
            <button class="icon-btn" onclick="app.exportSelectedHTML()">📄 HTMLで保存</button>
        </div>
    </nav>

    <div id="main-container">
        <header id="topbar">
            <button class="icon-btn" onclick="app.openSidebar()">☰</button>
            <input type="text" id="current-page-title" style="flex:1; border:none; background:transparent; font-size:1.1em; font-weight:700; color:inherit; outline:none;" onchange="app.updateTitle(this.value)">
            <button class="icon-btn" onclick="app.toggleEditMode()" id="edit-btn">✏️ <span class="btn-text">編集</span></button>
            <button class="icon-btn" onclick="window.print()">🖨️ <span class="btn-text">PDF</span></button>
            <button class="icon-btn" onclick="app.exportToPNG()">🖼️ <span class="btn-text">PNG</span></button>
        </header>
        
        <div id="content-wrapper">
            <div id="article-container">
                <div id="toc-area"></div>
                <div id="view-area"></div>
                <textarea id="edit-area" placeholder="ここに内容を書き込みます... (例: + 見出し)"></textarea>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const app = {
            pages: [],
            workspaceTitle: "Workspace",
            currentPageId: null,
            isEditing: false,

            init() {
                this.loadLocalData();
                this.handleRouting();
                window.addEventListener('hashchange', () => this.handleRouting());
            },

            loadLocalData() {
                const data = localStorage.getItem('personal_workspace_data_v5');
                this.pages = data ? JSON.parse(data) : [];
                this.workspaceTitle = localStorage.getItem('personal_workspace_title') || "Workspace";
                document.getElementById('workspace-title-input').value = this.workspaceTitle;
                if(localStorage.getItem('theme') === 'dark') document.body.className = 'dark-theme';
            },

            saveData() {
                localStorage.setItem('personal_workspace_data_v5', JSON.stringify(this.pages));
                localStorage.setItem('personal_workspace_title', this.workspaceTitle);
            },

            toggleTheme() {
                const isDark = document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            },

            async handleRouting() {
                const hash = window.location.hash;
                if (hash.startsWith('#s=')) {
                    const decoded = await this.decompressData(hash.replace('#s=', ''));
                    if (decoded) {
                        this.pages = decoded.pages;
                        this.workspaceTitle = decoded.wsTitle;
                        document.getElementById('workspace-title-input').value = this.workspaceTitle;
                    }
                }
                if (this.pages.length === 0) {
                    this.addPage("Welcome", "+ 使い方ガイド\n\n**記法サンプル**\n+ 大見出し\n++ 中見出し\n+++ 小見出し\n\n> これは引用ブロックです。\n\n@@ここにはHTMLタグなどをそのまま書けます@@\n\n編集ボタンを押して開始してください。");
                }
                this.renderSidebar();
                this.switchPage(this.currentPageId || this.pages[0].id);
            },

            renderSidebar() {
                const list = document.getElementById('page-list');
                list.innerHTML = '';
                this.pages.forEach(p => {
                    const li = document.createElement('li');
                    li.className = `page-item ${p.id === this.currentPageId ? 'active' : ''}`;
                    li.innerHTML = `
                        <input type="checkbox" class="share-checkbox" data-id="${p.id}" onclick="event.stopPropagation()">
                        <span class="page-title-text">${p.title || '無題'}</span>
                        <button class="delete-btn" onclick="app.deletePage(event, '${p.id}')">✕</button>
                    `;
                    li.onclick = () => this.switchPage(p.id);
                    list.appendChild(li);
                });
            },

            switchPage(id) {
                const page = this.pages.find(p => p.id === id);
                if (!page) return;
                this.currentPageId = id;
                document.getElementById('current-page-title').value = page.title;
                document.getElementById('edit-area').value = page.content;
                this.updateView(page.content);
                this.renderSidebar();
                if(window.innerWidth <= 768) this.closeSidebar();
            },

            updateView(content) {
                const viewArea = document.getElementById('view-area');
                viewArea.innerHTML = this.parseFTML(content);
                this.generateTOC();
            },

            parseFTML(text) {
                if (!text) return '';
                let html = text;
                const escaped = [];
                // @@ エスケープ
                html = html.replace(/@@(.*?)@@/g, (m, p1) => {
                    escaped.push(p1.replace(/</g, "&lt;"));
                    return `__ESC_${escaped.length - 1}__`;
                });

                // 見出し (ID付与)
                html = html.replace(/^(\+{1,3})\s+(.*?)$/gm, (m, l, t) => {
                    const level = l.length;
                    const id = `heading-${Math.random().toString(36).substr(2, 9)}`;
                    return `<h${level} id="${id}">${t}</h${level}>`;
                });

                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\/\/(.*?)\/\//g, '<em>$1</em>');
                html = html.replace(/^>\s+(.*?)$/gm, '<blockquote>$1</blockquote>');
                html = html.replace(/\n/g, '<br>');
                
                // エスケープ戻し
                escaped.forEach((v, i) => html = html.replace(`__ESC_${i}__`, v));
                return html;
            },

            generateTOC() {
                const viewArea = document.getElementById('view-area');
                const tocArea = document.getElementById('toc-area');
                const headings = viewArea.querySelectorAll('h1, h2, h3');
                
                if (headings.length < 2) {
                    tocArea.innerHTML = '';
                    return;
                }

                let tocHtml = `<div class="toc-container"><div class="toc-title">目次</div><ul class="toc-list">`;
                headings.forEach(h => {
                    const level = h.tagName.toLowerCase();
                    tocHtml += `<li class="toc-item toc-${level}"><a href="#${h.id}">${h.innerText}</a></li>`;
                });
                tocHtml += `</ul></div>`;
                tocArea.innerHTML = tocHtml;
            },

            deletePage(e, id) {
                e.stopPropagation();
                if(!confirm("このページを削除しますか？")) return;
                this.pages = this.pages.filter(p => p.id !== id);
                if(this.currentPageId === id) this.currentPageId = this.pages[0]?.id;
                this.saveData();
                this.handleRouting();
            },

            toggleEditMode() {
                this.isEditing = !this.isEditing;
                const view = document.getElementById('view-area');
                const toc = document.getElementById('toc-area');
                const edit = document.getElementById('edit-area');
                const btn = document.getElementById('edit-btn');

                if (this.isEditing) {
                    view.style.display = 'none';
                    toc.style.display = 'none';
                    edit.style.display = 'block';
                    btn.innerHTML = "✅ <span class='btn-text'>完了</span>";
                    edit.focus();
                } else {
                    const p = this.pages.find(x => x.id === this.currentPageId);
                    if(p) p.content = edit.value;
                    this.saveData();
                    this.updateView(edit.value);
                    view.style.display = 'block';
                    toc.style.display = 'block';
                    edit.style.display = 'none';
                    btn.innerHTML = "✏️ <span class='btn-text'>編集</span>";
                }
            },

            async exportToPNG() {
                this.showToast("画像を生成中...");
                const element = document.getElementById('article-container');
                const canvas = await html2canvas(element, {
                    backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-color'),
                    scale: 2,
                    useCORS: true
                });
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `${document.getElementById('current-page-title').value || 'page'}.png`;
                a.click();
                this.showToast("PNGを保存しました");
            },

            async compressData(obj) {
                const stream = new Blob([JSON.stringify(obj)]).stream().pipeThrough(new CompressionStream('deflate'));
                const buffer = await new Response(stream).arrayBuffer();
                return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            },

            async decompressData(b64) {
                try {
                    const bin = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
                    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
                    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
                    return JSON.parse(await new Response(stream).text());
                } catch(e) { return null; }
            },

            addPage(title = "新規ページ", content = "") {
                const id = 'p' + Date.now();
                this.pages.push({ id, title, content });
                this.saveData();
                this.switchPage(id);
            },

            updateTitle(v) { 
                const p = this.pages.find(x => x.id === this.currentPageId); 
                if(p) { p.title = v; this.saveData(); this.renderSidebar(); }
            },

            updateWorkspaceTitle(v) { this.workspaceTitle = v; this.saveData(); },

            async shareSelectedPages() {
                const ids = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => cb.dataset.id);
                if (ids.length === 0) return this.showToast("ページを選択してください");
                const data = { wsTitle: this.workspaceTitle, pages: this.pages.filter(p => ids.includes(p.id)) };
                const s = await this.compressData(data);
                const url = window.location.origin + window.location.pathname + '#s=' + s;
                await navigator.clipboard.writeText(url);
                this.showToast("共有URLをコピーしました");
            },

            exportSelectedHTML() {
                const selectedIds = Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => cb.dataset.id);
                if (selectedIds.length === 0) return this.showToast("ページを選択してください");
                const selectedPages = this.pages.filter(p => selectedIds.includes(p.id));
                let body = selectedPages.map(p => `<h1>${p.title}</h1><div>${this.parseFTML(p.content)}</div><hr>`).join('');
                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Export</title><style>body{font-family:sans-serif;max-width:800px;margin:40px auto;line-height:1.6;padding:20px;}h1{border-bottom:2px solid #eee;}</style></head><body>${body}</body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `export.html`;
                a.click();
            },

            openSidebar() { document.getElementById('sidebar').classList.remove('collapsed'); document.getElementById('sidebar-overlay').style.display = 'block'; },
            closeSidebar() { document.getElementById('sidebar').classList.add('collapsed'); document.getElementById('sidebar-overlay').style.display = 'none'; },
            showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); }
        };

        app.init();
    </script>
</body>
</html>
